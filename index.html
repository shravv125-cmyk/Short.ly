<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Short.ly | Advanced URL Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-900">

    <div class="max-w-6xl mx-auto p-6 lg:p-12">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-indigo-600">Short.ly</h1>
                <p class="text-slate-500 text-sm">Enterprise Link Management</p>
            </div>
            <div id="clock" class="text-xs font-mono bg-white px-3 py-1 rounded-full border border-slate-200"></div>
        </header>

        <div class="grid lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="soft-card p-8">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <span class="w-1.5 h-5 bg-indigo-500 rounded-full"></span> Shorten URL
                    </h2>
                    <div class="space-y-4">
                        <input id="longUrlInput" type="text" placeholder="Paste long URL..." class="soft-input">
                        <input id="categoryInput" type="text" placeholder="Category (e.g. Work)" class="soft-input">
                        <button onclick="shorten()" class="soft-button-primary">Generate Link</button>
                    </div>
                </div>

                <div class="soft-card p-8">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <span class="w-1.5 h-5 bg-emerald-500 rounded-full"></span> Redirect
                    </h2>
                    <div class="space-y-4">
                        <input id="shortCodeInput" type="text" placeholder="Enter 6-char code..." class="soft-input">
                        <button onclick="redirect()" class="soft-button-secondary">Go to Destination</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-8">
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="soft-card p-6">
                        <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">🔥 Top 3 (Max-Heap)</h3>
                        <div id="heapDisplay" class="space-y-3"></div>
                    </div>
                    <div class="soft-card p-6">
                        <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">📂 Categories (TreeMap)</h3>
                        <div id="treeDisplay" class="space-y-3"></div>
                    </div>
                </div>

                <div class="soft-card p-8">
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">🕒 Recent History (Linked List)</h3>
                    <div id="historyDisplay" class="divide-y divide-slate-100"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
